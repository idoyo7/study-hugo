<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 640" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="타임스탬프 압축 과정: 원본 32바이트가 Delta, Delta-of-Delta, ZigZag/Varint를 거쳐 약 11바이트로 줄어드는 예시">
  <style>
    .surface { fill: #fcfcfb; stroke: rgba(11,11,11,0.10); }
    .t1  { fill: #0b0b0b; }
    .t2  { fill: #52514e; }
    .tm  { fill: #898781; }
    .box  { fill: #cde2fb; stroke: #2a78d6; stroke-width: 1; }
    .zero { fill: rgba(0,131,0,0.10); stroke: #008300; stroke-width: 1; }
    .arrow { stroke: #898781; stroke-width: 1.5; fill: none; }
    .head  { fill: #898781; }
    .hair  { stroke: #e1e0d9; stroke-width: 1; }
    .num { font-variant-numeric: tabular-nums; }
    @media (prefers-color-scheme: dark) {
      .surface { fill: #1a1a19; stroke: rgba(255,255,255,0.10); }
      .t1  { fill: #ffffff; }
      .t2  { fill: #c3c2b7; }
      .box  { fill: #184f95; stroke: #3987e5; }
      .zero { fill: rgba(0,131,0,0.28); stroke: #008300; }
      .hair { stroke: #2c2c2a; }
    }
  </style>

  <rect class="surface" x="4" y="4" width="872" height="632" rx="14"/>

  <text class="t1" x="32" y="42" font-size="17" font-weight="700">타임스탬프 압축 — Delta → Delta-of-Delta → ZigZag/Varint</text>
  <text class="t2" x="32" y="66" font-size="13">스크레이프 주기 30초의 타임스탬프 4개가 디스크에 눕기까지 (개념 예시)</text>

  <!-- ① 원본 -->
  <text class="t2" x="32" y="104" font-size="13" font-weight="600">① 원본 타임스탬프 — 8B × 4 = 32B</text>
  <g font-size="14">
    <rect class="box" x="32"  y="114" width="186" height="44" rx="6"/>
    <rect class="box" x="232" y="114" width="186" height="44" rx="6"/>
    <rect class="box" x="432" y="114" width="186" height="44" rx="6"/>
    <rect class="box" x="632" y="114" width="186" height="44" rx="6"/>
    <text class="t1 num" x="125" y="141" text-anchor="middle">1720000000</text>
    <text class="t1 num" x="325" y="141" text-anchor="middle">1720000030</text>
    <text class="t1 num" x="525" y="141" text-anchor="middle">1720000060</text>
    <text class="t1 num" x="725" y="141" text-anchor="middle">1720000090</text>
  </g>

  <path class="arrow" d="M125 162 V 186"/><path class="head" d="M120 184 L125 192 L130 184 Z"/>
  <text class="t2" x="142" y="182" font-size="12.5">인접 값과의 차이만 저장한다</text>

  <!-- ② Delta -->
  <text class="t2" x="32" y="222" font-size="13" font-weight="600">② Delta — 규칙적인 수집 주기면 같은 값이 반복된다</text>
  <g font-size="14">
    <rect class="box" x="32"  y="232" width="186" height="44" rx="6"/>
    <rect class="box" x="232" y="232" width="186" height="44" rx="6"/>
    <rect class="box" x="432" y="232" width="186" height="44" rx="6"/>
    <rect class="box" x="632" y="232" width="186" height="44" rx="6"/>
    <text class="t1 num" x="125" y="252" text-anchor="middle">1720000000</text>
    <text class="tm"     x="125" y="268" font-size="10.5" text-anchor="middle">첫 값은 그대로</text>
    <text class="t1 num" x="325" y="259" text-anchor="middle">+30</text>
    <text class="t1 num" x="525" y="259" text-anchor="middle">+30</text>
    <text class="t1 num" x="725" y="259" text-anchor="middle">+30</text>
  </g>

  <path class="arrow" d="M125 280 V 304"/><path class="head" d="M120 302 L125 310 L130 302 Z"/>
  <text class="t2" x="142" y="300" font-size="12.5">델타의 델타를 저장한다</text>

  <!-- ③ Delta-of-Delta -->
  <text class="t2" x="32" y="340" font-size="13" font-weight="600">③ Delta-of-Delta — 주기가 일정하면 0이 된다</text>
  <g font-size="14">
    <rect class="box"  x="32"  y="350" width="186" height="44" rx="6"/>
    <rect class="box"  x="232" y="350" width="186" height="44" rx="6"/>
    <rect class="zero" x="432" y="350" width="186" height="44" rx="6"/>
    <rect class="zero" x="632" y="350" width="186" height="44" rx="6"/>
    <text class="t1 num" x="125" y="377" text-anchor="middle">1720000000</text>
    <text class="t1 num" x="325" y="377" text-anchor="middle">+30</text>
    <text class="t1 num" x="525" y="377" text-anchor="middle" font-weight="700">0</text>
    <text class="t1 num" x="725" y="377" text-anchor="middle" font-weight="700">0</text>
  </g>

  <path class="arrow" d="M125 398 V 422"/><path class="head" d="M120 420 L125 428 L130 420 Z"/>
  <text class="t2" x="142" y="418" font-size="12.5">ZigZag(음수를 짝수 정수로) + Varint(작은 수는 1바이트)</text>

  <!-- ④ 바이트 레이아웃 -->
  <text class="t2" x="32" y="458" font-size="13" font-weight="600">④ 바이트로 눕는 모습 — 상자 폭 = 실제 크기</text>
  <g font-size="13.5">
    <rect class="box"  x="32"  y="468" width="240" height="44" rx="6"/>
    <rect class="box"  x="286" y="468" width="48"  height="44" rx="6"/>
    <rect class="zero" x="348" y="468" width="48"  height="44" rx="6"/>
    <rect class="zero" x="410" y="468" width="48"  height="44" rx="6"/>
    <text class="t1 num" x="152" y="495" text-anchor="middle">1720000000</text>
    <text class="t1 num" x="310" y="495" text-anchor="middle">0x3C</text>
    <text class="t1 num" x="372" y="495" text-anchor="middle">0x00</text>
    <text class="t1 num" x="434" y="495" text-anchor="middle">0x00</text>
  </g>
  <g class="tm" font-size="11" text-anchor="middle">
    <text x="152" y="528">8B</text>
    <text x="310" y="528">1B</text>
    <text x="372" y="528">1B</text>
    <text x="434" y="528">1B</text>
  </g>
  <text class="t1" x="490" y="490" font-size="15" font-weight="700">32B → ≈11B</text>
  <text class="tm" x="490" y="510" font-size="12">개념 단순화 — 실제 블록 포맷과는 다르다</text>

  <line class="hair" x1="32" y1="548" x2="848" y2="548"/>

  <!-- 실측 -->
  <text class="t2" x="32" y="580" font-size="13">여기에 값 스트림 압축·블록 압축까지 얹은 네이버 실운영 실측</text>
  <text class="t1 num" x="32" y="612" font-size="22" font-weight="700">0.92 B / 데이터포인트</text>
  <text class="tm" x="290" y="610" font-size="12.5">— 원본 16B(timestamp 8B + value 8B) 대비 ≈ 17×</text>
</svg>
