<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 664" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="멀티 AZ에 배치된 ClickHouse RF2 복제와 Keeper 3노드 쿼럼, 그리고 AZ 한 개가 다운돼도 남은 replica와 과반 쿼럼으로 읽기·쓰기가 지속되는 동작 요약">
  <style>
    .surface { fill: #fcfcfb; stroke: rgba(11,11,11,0.10); }
    .t1  { fill: #0b0b0b; }
    .t2  { fill: #52514e; }
    .tm  { fill: #898781; }
    .ch  { fill: #cde2fb; stroke: #2a78d6; stroke-width: 1; }
    .kp  { fill: rgba(0,131,0,0.10); stroke: #008300; stroke-width: 1; }
    .az  { fill: none; stroke: #e1e0d9; stroke-width: 1; }
    .down { fill: #fcfcfb; stroke: #898781; stroke-width: 1; stroke-dasharray: 4 3; }
    .azdown { fill: none; stroke: #898781; stroke-width: 1; stroke-dasharray: 4 3; }
    .arrow { stroke: #898781; stroke-width: 1.5; fill: none; }
    .link  { stroke: #008300; stroke-width: 1.5; fill: none; }
    .dash  { stroke: #898781; stroke-width: 1.3; fill: none; stroke-dasharray: 5 4; }
    .head  { fill: #898781; }
    .hair  { stroke: #e1e0d9; stroke-width: 1; }
    .num   { font-variant-numeric: tabular-nums; }
    @media (prefers-color-scheme: dark) {
      .surface { fill: #1a1a19; stroke: rgba(255,255,255,0.10); }
      .t1  { fill: #ffffff; }
      .t2  { fill: #c3c2b7; }
      .ch  { fill: #184f95; stroke: #3987e5; }
      .kp  { fill: rgba(0,131,0,0.28); stroke: #008300; }
      .az  { stroke: #2c2c2a; }
      .down { fill: #1a1a19; stroke: #898781; }
      .hair { stroke: #2c2c2a; }
    }
  </style>

  <rect class="surface" x="4" y="4" width="872" height="656" rx="14"/>

  <text class="t1" x="32" y="38" font-size="17" font-weight="700">멀티 AZ 복제·Keeper 쿼럼 배치와 장애 시 동작</text>
  <text class="t2" x="32" y="58" font-size="12.5">1 shard × RF2(2 AZ) · ReplicatedMergeTree(멀티마스터) · Keeper 3노드(3 AZ) 쿼럼</text>

  <!-- 범례 -->
  <g font-size="11.5">
    <rect class="ch" x="32"  y="70" width="16" height="12" rx="3"/>
    <text class="t2" x="54"  y="80">ClickHouse replica (RF2)</text>
    <rect class="kp" x="248" y="70" width="16" height="12" rx="3"/>
    <text class="t2" x="270" y="80">Keeper 노드 (3노드 쿼럼)</text>
    <rect class="down" x="470" y="70" width="16" height="12" rx="3"/>
    <text class="tm" x="492" y="80">다운(장애)</text>
  </g>

  <!-- ===================== 패널 ① 정상 ===================== -->
  <text class="t2" x="32" y="104" font-size="13" font-weight="600">① 정상 — 멀티 AZ 배치</text>

  <!-- AZ 컨테이너 -->
  <rect class="az" x="35"  y="120" width="220" height="168" rx="10"/>
  <rect class="az" x="330" y="120" width="220" height="168" rx="10"/>
  <rect class="az" x="625" y="120" width="220" height="168" rx="10"/>
  <g font-size="12" font-weight="600" text-anchor="middle">
    <text class="t2" x="145" y="140">AZ-a</text>
    <text class="t2" x="440" y="140">AZ-b</text>
    <text class="t2" x="735" y="140">AZ-c</text>
  </g>

  <!-- Keeper 쿼럼 연결(박스 뒤 gap에서 보임) -->
  <line class="dash" x1="235" y1="247" x2="350" y2="247"/>
  <line class="dash" x1="530" y1="247" x2="645" y2="247"/>
  <text class="tm" x="292" y="242" font-size="10" text-anchor="middle">쿼럼(Raft)</text>

  <!-- ClickHouse replica -->
  <rect class="ch" x="55"  y="150" width="180" height="54" rx="8"/>
  <rect class="ch" x="350" y="150" width="180" height="54" rx="8"/>
  <g text-anchor="middle">
    <text class="t1" x="145" y="172" font-size="13.5" font-weight="700">CH replica-1</text>
    <text class="tm" x="145" y="189" font-size="10.5">완전한 사본(EBS)</text>
    <text class="t1" x="440" y="172" font-size="13.5" font-weight="700">CH replica-2</text>
    <text class="tm" x="440" y="189" font-size="10.5">완전한 사본(EBS)</text>
  </g>
  <!-- AZ-c: RF2라 replica 없음 -->
  <g text-anchor="middle" font-size="11">
    <text class="tm" x="735" y="170">RF2 — 이 AZ엔</text>
    <text class="tm" x="735" y="186">CH replica 없음</text>
  </g>

  <!-- part 직접 fetch (양방향) -->
  <line class="arrow" x1="246" y1="177" x2="339" y2="177"/>
  <path class="head" d="M235 177 L244 173 L244 181 Z"/>
  <path class="head" d="M350 177 L341 173 L341 181 Z"/>
  <text class="t2" x="292" y="165" font-size="11.5" text-anchor="middle">part 직접 fetch</text>

  <!-- Keeper 노드 -->
  <rect class="kp" x="55"  y="220" width="180" height="54" rx="8"/>
  <rect class="kp" x="350" y="220" width="180" height="54" rx="8"/>
  <rect class="kp" x="645" y="220" width="180" height="54" rx="8"/>
  <g text-anchor="middle">
    <text class="t1" x="145" y="242" font-size="13.5" font-weight="700">Keeper-1</text>
    <text class="tm" x="145" y="259" font-size="10.5">조정 메타(gp3)</text>
    <text class="t1" x="440" y="242" font-size="13.5" font-weight="700">Keeper-2</text>
    <text class="tm" x="440" y="259" font-size="10.5">조정 메타(gp3)</text>
    <text class="t1" x="735" y="242" font-size="13.5" font-weight="700">Keeper-3</text>
    <text class="tm" x="735" y="259" font-size="10.5">조정 메타(gp3)</text>
  </g>

  <text class="t2" x="35" y="308" font-size="12.5">쓰기(INSERT·DDL·머지)는 Keeper 과반(3노드 중 2) 필요 · 읽기(SELECT)는 Keeper를 타지 않음</text>

  <line class="hair" x1="32" y1="326" x2="848" y2="326"/>

  <!-- ===================== 패널 ② AZ 1개 다운 ===================== -->
  <text class="t2" x="32" y="352" font-size="13" font-weight="600">② AZ 1개 다운 — 남은 replica·쿼럼으로 지속</text>

  <rect class="azdown" x="35"  y="366" width="220" height="168" rx="10"/>
  <rect class="az"     x="330" y="366" width="220" height="168" rx="10"/>
  <rect class="az"     x="625" y="366" width="220" height="168" rx="10"/>
  <g font-size="12" font-weight="600" text-anchor="middle">
    <text class="tm" x="145" y="386">AZ-a (다운)</text>
    <text class="t2" x="440" y="386">AZ-b</text>
    <text class="t2" x="735" y="386">AZ-c</text>
  </g>

  <!-- Keeper 쿼럼: A-B는 다운 링(faded), B-C는 생존 쿼럼 -->
  <line class="dash" x1="235" y1="493" x2="350" y2="493"/>
  <line class="link" x1="530" y1="493" x2="645" y2="493"/>
  <text class="tm" x="587" y="488" font-size="10" text-anchor="middle">2/3 과반</text>

  <!-- ClickHouse replica -->
  <rect class="down" x="55"  y="396" width="180" height="54" rx="8"/>
  <rect class="ch"   x="350" y="396" width="180" height="54" rx="8"/>
  <g text-anchor="middle">
    <text class="tm" x="145" y="418" font-size="13.5" font-weight="700">CH replica-1</text>
    <text class="tm" x="145" y="435" font-size="10.5">× 다운</text>
    <text class="t1" x="440" y="418" font-size="13.5" font-weight="700">CH replica-2</text>
    <text class="t2" x="440" y="435" font-size="10.5">read + write 계속</text>
  </g>
  <g text-anchor="middle" font-size="11">
    <text class="tm" x="735" y="416">RF2 — 이 AZ엔</text>
    <text class="tm" x="735" y="432">CH replica 없음</text>
  </g>

  <!-- Keeper 노드 -->
  <rect class="down" x="55"  y="466" width="180" height="54" rx="8"/>
  <rect class="kp"   x="350" y="466" width="180" height="54" rx="8"/>
  <rect class="kp"   x="645" y="466" width="180" height="54" rx="8"/>
  <g text-anchor="middle">
    <text class="tm" x="145" y="488" font-size="13.5" font-weight="700">Keeper-1</text>
    <text class="tm" x="145" y="505" font-size="10.5">× 다운</text>
    <text class="t1" x="440" y="488" font-size="13.5" font-weight="700">Keeper-2</text>
    <text class="t2" x="440" y="505" font-size="10.5">생존</text>
    <text class="t1" x="735" y="488" font-size="13.5" font-weight="700">Keeper-3</text>
    <text class="t2" x="735" y="505" font-size="10.5">생존</text>
  </g>

  <text class="t2" x="35" y="556" font-size="12.5">AZ-a가 통째로 다운돼도 replica-2가 read+write를 그대로 지속한다 — RMT 멀티마스터라 승격 절차가 없다.</text>
  <text class="t2" x="35" y="574" font-size="12.5">Keeper는 2/3로 과반을 유지 → 쓰기 계속. 과반(2)을 잃는 순간에만 read-only로 전락하고, 읽기는 그래도 산다.</text>

  <line class="hair" x1="32" y1="592" x2="848" y2="592"/>

  <text class="t1" x="32" y="618" font-size="14" font-weight="700">한 AZ·한 노드 손실은 관측을 멈추지 않는다</text>
  <text class="tm" x="32" y="640" font-size="12">cross-AZ replica 복제 + Keeper 과반 쿼럼이 겹겹의 방어선 — 진짜 정지 지점은 CH 전체 다운과 Keeper 정족수 상실뿐이다</text>
</svg>
