<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 640" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="hot·cold 2계층 데이터 티어링 구조: hot 티어는 노드당 단일 gp3 EBS, cold 티어는 S3 Standard에 replica마다 RF배수 사본을 두는 shared-nothing이다. TTL이 TO VOLUME으로 hot에서 cold로 옮기고 DELETE로 만료시키며, 세션은 cold로 안 내리고 hot 30일 후 삭제한다. 티어링은 내구성이 아니고 내구성은 멀티 AZ RF 복제와 백업이 담당한다.">
  <style>
    .surface { fill: #fcfcfb; stroke: rgba(11,11,11,0.10); }
    .t1  { fill: #0b0b0b; }
    .t2  { fill: #52514e; }
    .tm  { fill: #898781; }
    .box  { fill: #cde2fb; stroke: #2a78d6; stroke-width: 1; }
    .zero { fill: rgba(0,131,0,0.10); stroke: #008300; stroke-width: 1; }
    .arrow { stroke: #898781; stroke-width: 1.5; fill: none; }
    .head  { fill: #898781; }
    .hair  { stroke: #e1e0d9; stroke-width: 1; }
    .grp   { fill: none; stroke: #e1e0d9; stroke-width: 1; }
    .chip  { fill: none; stroke: #e1e0d9; stroke-width: 1; }
    .callout { fill: none; stroke: #898781; stroke-width: 1.5; }
    .num { font-variant-numeric: tabular-nums; }
    @media (prefers-color-scheme: dark) {
      .surface { fill: #1a1a19; stroke: rgba(255,255,255,0.10); }
      .t1  { fill: #ffffff; }
      .t2  { fill: #c3c2b7; }
      .box  { fill: #184f95; stroke: #3987e5; }
      .zero { fill: rgba(0,131,0,0.28); stroke: #008300; }
      .hair { stroke: #2c2c2a; }
      .grp  { stroke: #2c2c2a; }
      .chip { stroke: #2c2c2a; }
      .callout { stroke: #c3c2b7; }
    }
  </style>

  <rect class="surface" x="4" y="4" width="872" height="632" rx="14"/>

  <text class="t1" x="32" y="42" font-size="17" font-weight="700">데이터 티어링 — hot gp3 EBS · cold S3 · TTL 이동</text>
  <text class="t2" x="32" y="66" font-size="13">2계층 스토리지 — 최근 데이터는 hot(EBS)에 두고, 오래된 데이터는 TTL이 cold(S3)로 민다</text>

  <!-- ══ HOT 티어 패널 ══ -->
  <rect class="grp" x="32" y="88" width="340" height="208" rx="12"/>
  <text class="t1" x="50" y="114" font-size="15" font-weight="700">hot 티어</text>
  <text class="t2" x="120" y="114" font-size="12.5">· 노드당 단일 gp3 EBS</text>

  <rect class="box" x="48" y="128" width="308" height="54" rx="8"/>
  <text class="t1"  x="202" y="152" font-size="13.5" text-anchor="middle">gp3 EBS — 노드당 단일 볼륨</text>
  <text class="tm"  x="202" y="170" font-size="10.5" text-anchor="middle">baseline 3,000 IOPS + 소량 throughput</text>

  <text class="tm" x="48" y="202" font-size="11">볼륨 내구성 99.8~99.9% (매체 단위)</text>

  <text class="t2" x="48" y="224" font-size="11.5" font-weight="600">hot 창 → 경과 후 cold로 이동</text>
  <rect class="chip" x="48"  y="234" width="146" height="48" rx="7"/>
  <rect class="chip" x="210" y="234" width="146" height="48" rx="7"/>
  <text class="tm"      x="121" y="254" font-size="10"   text-anchor="middle">logs · traces</text>
  <text class="t1 num"  x="121" y="274" font-size="16" font-weight="700" text-anchor="middle">14일</text>
  <text class="tm"      x="283" y="254" font-size="10"   text-anchor="middle">metrics</text>
  <text class="t1 num"  x="283" y="274" font-size="16" font-weight="700" text-anchor="middle">30일</text>

  <!-- ══ COLD 티어 패널 ══ -->
  <rect class="grp" x="508" y="88" width="340" height="208" rx="12"/>
  <text class="t1" x="526" y="114" font-size="15" font-weight="700">cold 티어</text>
  <text class="t2" x="598" y="114" font-size="12.5">· S3 Standard + cache</text>

  <rect class="zero" x="524" y="128" width="308" height="54" rx="8"/>
  <text class="t1"   x="678" y="152" font-size="13.5" text-anchor="middle">S3 Standard — 내구성 11 nines</text>
  <text class="tm"   x="678" y="170" font-size="10.5" text-anchor="middle">EBS LRU cache 150Gi (첫 조회 지연 완화)</text>

  <text class="t2" x="524" y="202" font-size="11.5" font-weight="600">shared-nothing — replica마다 독립 사본</text>
  <rect class="zero" x="524" y="210" width="146" height="44" rx="7"/>
  <rect class="zero" x="686" y="210" width="146" height="44" rx="7"/>
  <text class="t1 num" x="597" y="237" font-size="13" text-anchor="middle">replica 1 사본</text>
  <text class="t1 num" x="759" y="237" font-size="13" text-anchor="middle">replica 2 사본</text>
  <text class="tm" x="524" y="276" font-size="10.5">RF2면 S3에도 2벌 · zero-copy replication 금지</text>

  <!-- ══ hot → cold 이동 화살표 ══ -->
  <text class="t2 num" x="440" y="147" font-size="10.5" text-anchor="middle">TTL: TO VOLUME 'cold'</text>
  <path class="arrow" d="M372 158 H505"/>
  <path class="head"  d="M504 153 L512 158 L504 163 Z"/>

  <!-- ══ DELETE / 만료 (hot=sessions, cold=logs·traces·metrics) ══ -->
  <path class="arrow" d="M202 296 V331"/>
  <path class="head"  d="M197 330 L207 330 L202 338 Z"/>
  <text class="t2" x="220" y="320" font-size="11.5">sessions DELETE</text>
  <rect class="chip" x="152" y="338" width="100" height="34" rx="17"/>
  <text class="t1" x="202" y="360" font-size="12" text-anchor="middle">만료</text>
  <text class="tm" x="202" y="390" font-size="10.5" text-anchor="middle">sessions: S3 미이동 · hot 30일 후 DELETE</text>

  <path class="arrow" d="M678 296 V331"/>
  <path class="head"  d="M673 330 L683 330 L678 338 Z"/>
  <text class="t2" x="696" y="320" font-size="11.5">TTL DELETE</text>
  <rect class="chip" x="628" y="338" width="100" height="34" rx="17"/>
  <text class="t1" x="678" y="360" font-size="12" text-anchor="middle">만료</text>
  <text class="tm num" x="678" y="390" font-size="10.5" text-anchor="middle">logs·traces 90/180/365일 · metrics 180/365일</text>

  <!-- ══ 핵심 주석 — 티어링 ≠ 내구성 ══ -->
  <rect class="callout" x="32" y="412" width="816" height="200" rx="12"/>
  <text class="t1" x="52" y="442" font-size="14" font-weight="700">핵심 — 티어링은 내구성이 아니다</text>

  <text class="t2" x="52" y="470" font-size="12.5">•</text>
  <text class="t2" x="68" y="470" font-size="12.5">티어링(hot→cold 이동)은 비용·조회지연 축이다. 매체 내구성(gp3 99.8~99.9% · S3 11 nines)은</text>
  <text class="t2" x="68" y="489" font-size="12.5">그 매체가 사본을 안 잃을 확률일 뿐, 데이터가 안전하다는 뜻이 아니다.</text>

  <text class="t2" x="52" y="516" font-size="12.5">•</text>
  <text class="t2" x="68" y="516" font-size="12.5">데이터 내구성·가용성은 멀티 AZ RF2+ ReplicatedMergeTree + clickhouse-backup → S3가 담당한다.</text>

  <text class="t2" x="52" y="543" font-size="12.5">•</text>
  <text class="t2" x="68" y="543" font-size="12.5">cold(S3)도 {replica} 경로에 RF배수 사본을 둔다(RF2면 S3에도 2벌) — shared-nothing이며</text>
  <text class="t2" x="68" y="562" font-size="12.5">zero-copy replication은 프로덕션 금지다. "S3라서 사본 1벌로 줄이자"는 성립하지 않는다.</text>

  <text class="tm" x="52" y="592" font-size="11">즉 티어링은 비용·조회지연 축, 내구성은 RF 복제 + 백업 축 — 둘을 같은 결정으로 섞지 않는다.</text>
</svg>
