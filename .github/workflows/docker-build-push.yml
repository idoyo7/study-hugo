name: Docker Image Build & Update Manifest

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required for ghcr.io push via secrets.GITHUB_TOKEN

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: idoyo7/study-hugo

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHORT_SHA
        run: echo "SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Compute SHORT_SHA
        run: echo "SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Checkout montstrap-manifest (GitOps repo)
        uses: actions/checkout@v4
        with:
          repository: idoyo7/montstrap-manifest
          token: ${{ secrets.MONTSTRAP_TOKEN }}
          path: montstrap-manifest
          ref: main

      - name: Update stage image tag
        working-directory: montstrap-manifest
        run: |
          KUSTOMIZATION=stage/study-hugo/kustomization.yaml
          yq eval -i \
            '(.images[] | select(.name == "ghcr.io/idoyo7/study-hugo")).newTag = strenv(SHA)' \
            "$KUSTOMIZATION"
          echo "=== updated ${KUSTOMIZATION} ==="
          cat "$KUSTOMIZATION"

      - name: Commit and push
        working-directory: montstrap-manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "ci-bot@users.noreply.github.com"
          if git diff --quiet; then
            echo "No manifest change — skipping commit"
            exit 0
          fi
          git add stage/study-hugo/kustomization.yaml
          git commit -m "Update study-hugo image tag to ${SHA}"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          git push
